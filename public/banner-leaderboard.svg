<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 360" width="1600" height="360" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f6a4c"/>
      <stop offset="1" stop-color="#0a3b2b"/>
    </linearGradient>
    <linearGradient id="sheen2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="360" fill="url(#bg2)"/>
  <rect width="1600" height="360" fill="url(#sheen2)"/>
  <!-- podium -->
  <g transform="translate(1140 74)">
    <!-- crown -->
    <g transform="translate(150 -6)">
      <path d="M-30 40 L-20 6 L-6 22 L4 -8 L14 22 L28 6 L38 40 Z" fill="#f5c542" stroke="#d99400" stroke-width="2" stroke-linejoin="round"/>
      <rect x="-34" y="38" width="76" height="14" rx="4" fill="#f5c542" stroke="#d99400" stroke-width="2"/>
    </g>
    <rect x="0"   y="150" width="90" height="112" rx="6" fill="#ffffff" fill-opacity="0.18"/>
    <rect x="210" y="176" width="90" height="86"  rx="6" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="105" y="118" width="90" height="144" rx="6" fill="#ffffff" fill-opacity="0.30"/>
    <text x="45"  y="220" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff" fill-opacity="0.85">2</text>
    <text x="150" y="200" text-anchor="middle" font-size="38" font-weight="800" fill="#ffffff">1</text>
    <text x="255" y="230" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff" fill-opacity="0.75">3</text>
  </g>
  <!-- copy -->
  <text x="96" y="150" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="-1">Climb the leaderboard</text>
  <text x="98" y="200" fill="#ffffff" fill-opacity="0.85" font-size="26" font-weight="500">Every question ranks its fastest solvers — race the clock</text>
  <g transform="translate(98 236)">
    <rect width="214" height="52" rx="10" fill="#ffffff"/>
    <text x="28" y="34" fill="#0a3b2b" font-size="20" font-weight="700">See rankings  →</text>
  </g>
</svg>
